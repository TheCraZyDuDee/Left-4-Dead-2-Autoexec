//// Buy Keybinds

// For servers with purchase system in place, some may need !buy instead.
// This is my personal preset for the following server group: https://steamcommunity.com/groups/L4D2-COOP-Multi.
bind kp_end                            "sm_buy molotov"
bind kp_downarrow                      "sm_buy bile"
bind kp_pgdn                           "sm_buy pipe"
bind kp_leftarrow                      "sm_buy spas"
bind kp_5                              "sm_buy ak47"
bind kp_rightarrow                     "sm_buy awp"
bind kp_home                           "sm_buy knife"
bind kp_uparrow                        "sm_buy katana"
bind kp_pgup                           "sm_buy chainsaw"
bind kp_slash                          "sm_buy medkit"
bind kp_multiply                       "sm_buy defib"
bind kp_plus                           "sm_buy adrenaline"
bind kp_minus                          "sm_buy pills"
bind kp_ins                            "sm_buy health"
bind kp_del                            "sm_buy ammo"
bind kp_enter                          "sm_buy laser"


